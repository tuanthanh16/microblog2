<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microblog</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="navbar__brand">
        <img
          class="navbar__logo"
          src="/static/logo.svg"
          alt="The Microblog logo"
        />Microblog
      </div>
      <ul class="navbar__navigation">
        <li class="navbar__navigation-item">
          <a href="#" class="navbar__link">Recent</a>
        </li>
        <li class="navbar__navigation-item">
          <a href="#" class="navbar__link">Calendar</a>
        </li>
      </ul>
    </header>
    <main class="main">
      <section>
        <h1>Add new entry</h1>
        <form class="form" method="POST">
          <p class="form__input">
            <label for="entry" class="form__label">Entry contents:</label>
            <textarea
              name="content"
              id="entry"
              class="form__textarea"
            ></textarea>
          </p>
          <button type="submit" class="form__submit">Add entry</button>
        </form>
      </section>
      <section>
        <h1>Recent posts</h1>
        {% for entry in entries %}
        <article class="entry">
          <div>
            <h2 class="entry__title">
              {{ (entry[1] or "") | truncate(30, true) }}
            </h2>
            <time class="entry__date" datetime="{{ entry[1] }}"
              >• {{ entry[2] }}</time
            >
          </div>

          <div class="entry__actions">
            <!-- Edit -->
            <a
              href="{{ url_for('edit_entry', id=entry[0])}}"
              class="entry__action"
              title="Edit"
            >
              <i class="bi bi-pencil-square"></i>
            </a>

            <!-- Delete -->
            <a
              href="{{ url_for('delete_entry', id=entry[0])}}"
              class="entry__action entry__action--danger"
              title="Delete"
              onclick="return confirm('Delete this entry?');"
            >
              <i class="bi bi-trash"></i>
            </a>
          </div>

          <p class="entry__content">{{ entry[1] }}</p>
        </article>
        {% endfor %}
      </section>
    </main>
    <footer class="footer">
      <div class="footer__content">
        <section class="left">
          <a class="footer__item">Made by Jose Salvatierra</a>
          <a class="footer__item">Check out my other projects</a>
        </section>
        <section class="right">
          <div class="footer__column">
            <a class="footer__item">Recent</a>
            <a class="footer__item">Calendar</a>
          </div>
          <div class="footer__column">
            <a class="footer__item" href="#">About</a>
            <a class="footer__item">How this was made</a>
          </div>
        </section>
      </div>
    </footer>
  </body>
</html>
