<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Microblog{% endblock %}</title>

    <!-- Your existing CSS -->
    <link rel="stylesheet" href="/static/css/styles.css" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="navbar__brand">
        <a href="{{ url_for('home') }}" class="navbar__brand-link">
          <img
            class="navbar__logo"
            src="/static/logo.svg"
            alt="The Microblog logo"
          />
          Microblog
        </a>
      </div>

      <ul class="navbar__navigation">
        <li class="navbar__navigation-item">
          <a href="{{ url_for('home') }}" class="navbar__link">Recent</a>
        </li>
        <li class="navbar__navigation-item">
          <a href="#" class="navbar__link">Calendar</a>
        </li>
      </ul>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main">{% block content %}{% endblock %}</main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer__content">
        <section class="left">
          <a class="footer__item">Made by Jose Salvatierra</a>
          <a class="footer__item">Check out my other projects</a>
        </section>

        <section class="right">
          <div class="footer__column">
            <a class="footer__item">Recent</a>
            <a class="footer__item">Calendar</a>
          </div>

          <div class="footer__column">
            <a class="footer__item" href="#">About</a>
            <a class="footer__item">How this was made</a>
          </div>
        </section>
      </div>
    </footer>
  </body>
</html>
``
